<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>D&D Info</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Dungeons & Dragons Info</h1>
    </header>
    <main>
        <table>
            <tr>
                <td><a href="index.html">Home</a></td>
                <td><a href="classes.html">Classes</a></td>
                <td><a href="species.html">Species</a></td>
                <td><a href="spells.html">Spells</a></td>
            </tr>
        </table>
        <div id="latest-push" style="background-color:#f3f592; border-radius: 25px; padding: 10px;"></div>
        <script>
            fetch('https://api.github.com/repos/Mine1115/dndInfo/commits?sha=main')
            .then(response => response.json())
            .then(data => {const latestCommit = data[0]; 
                document.getElementById('latest-push').innerHTML = ` <p><strong>Commit Message:</strong> ${latestCommit.commit.message}</p> <p><strong>Author:</strong> ${latestCommit.commit.author.name}</p> <p><strong>Date:</strong> ${latestCommit.commit.author.date}</p> <p><strong>URL:</strong> <a href="${latestCommit.html_url}">${latestCommit.html_url}</a></p> `;
            })
            .catch(error => console.error('Error:', error));
        </script>
    </main>
    <footer>
        <a href="legal-information.html">Legal Information</a>
    </footer>
</body>
</html>
